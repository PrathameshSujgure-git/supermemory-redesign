<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design History — Supermemory Redesign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0B1015;
      color: #E2E8F0;
      min-height: 100vh;
    }

    /* Nav */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(11, 16, 21, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .topbar-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }

    .topbar-logo span { color: #3478F6; font-size: 20px; }

    .topbar-divider {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.12);
    }

    .topbar-title {
      font-size: 14px;
      font-weight: 500;
      color: #6B7280;
    }

    .topbar-count {
      font-size: 13px;
      font-weight: 600;
      color: #3478F6;
      background: rgba(52, 120, 246, 0.1);
      padding: 4px 12px;
      border-radius: 100px;
    }

    /* Main */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 32px 80px;
    }

    .header {
      margin-bottom: 48px;
    }

    .header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 500;
      letter-spacing: -1.2px;
      color: #fff;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 15px;
      color: #6B7280;
    }

    /* Timeline */
    .timeline {
      position: relative;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 19px;
      top: 8px;
      bottom: 8px;
      width: 1px;
      background: rgba(255,255,255,0.06);
    }

    .entry {
      position: relative;
      padding-left: 56px;
      padding-bottom: 40px;
    }

    .entry:last-child { padding-bottom: 0; }

    .entry-dot {
      position: absolute;
      left: 12px;
      top: 8px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #0B1015;
      border: 2px solid #3478F6;
      z-index: 1;
    }

    .entry:first-child .entry-dot {
      background: #3478F6;
      box-shadow: 0 0 0 4px rgba(52, 120, 246, 0.15);
    }

    .entry-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .entry-card:hover {
      border-color: rgba(255,255,255,0.12);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .entry-meta {
      padding: 24px 28px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .entry-meta-left { flex: 1; }

    .entry-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #3478F6;
      margin-bottom: 10px;
    }

    .entry-badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #3478F6;
    }

    .entry-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.5px;
      color: #fff;
      margin-bottom: 6px;
    }

    .entry-desc {
      font-size: 14px;
      color: #6B7280;
      line-height: 1.5;
      max-width: 600px;
    }

    .entry-date {
      font-size: 13px;
      font-weight: 500;
      color: #4A5568;
      white-space: nowrap;
      text-align: right;
    }

    .entry-date-day {
      font-size: 14px;
      color: #9CA3AF;
      font-weight: 600;
    }

    .entry-date-time {
      font-size: 12px;
      color: #4A5568;
      margin-top: 2px;
    }

    .entry-actions {
      padding: 20px 28px;
      display: flex;
      gap: 10px;
    }

    .entry-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: #9CA3AF;
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .entry-btn:hover {
      border-color: rgba(255,255,255,0.2);
      color: #fff;
      background: rgba(255,255,255,0.04);
    }

    .entry-btn.primary {
      background: rgba(52, 120, 246, 0.1);
      border-color: rgba(52, 120, 246, 0.2);
      color: #3478F6;
    }

    .entry-btn.primary:hover {
      background: rgba(52, 120, 246, 0.18);
      border-color: rgba(52, 120, 246, 0.35);
    }

    .entry-preview {
      margin: 0 28px 24px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
      position: relative;
      height: 320px;
      background: #F5F9FF;
    }

    .entry-preview iframe {
      width: 1440px;
      height: 900px;
      border: none;
      transform: scale(0.72);
      transform-origin: top left;
      pointer-events: none;
    }

    .entry-preview-overlay {
      position: absolute;
      inset: 0;
      cursor: pointer;
      z-index: 2;
    }

    /* Empty */
    .empty {
      text-align: center;
      padding: 80px 32px;
      color: #4A5568;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .main { padding: 32px 20px 60px; }
      .header h1 { font-size: 24px; }
      .entry-meta { flex-direction: column; }
      .entry-preview { height: 200px; }
      .entry-preview iframe { transform: scale(0.45); }
      .topbar { padding: 16px 20px; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="topbar-logo"><span>&#x22B9;</span> supermemory</a>
      <div class="topbar-divider"></div>
      <span class="topbar-title">Design History</span>
    </div>
    <span class="topbar-count" id="count"></span>
  </div>

  <div class="main">
    <div class="header">
      <h1>Iteration History</h1>
      <p>Every design pushed to Figma, tracked with preview, timestamp, and link.</p>
    </div>

    <div class="timeline" id="timeline">
      <div class="empty" id="empty">
        <div class="empty-icon">&#x29BE;</div>
        <p>No iterations yet. Designs will appear here as they're sent to Figma.</p>
      </div>
    </div>
  </div>

  <script>
    async function loadHistory() {
      const timeline = document.getElementById('timeline');
      const empty = document.getElementById('empty');
      const countEl = document.getElementById('count');

      try {
        const res = await fetch('history.json');
        const data = await res.json();

        if (!data.length) return;

        empty.style.display = 'none';
        countEl.textContent = `${data.length} iteration${data.length !== 1 ? 's' : ''}`;

        // Reverse so newest is first
        const sorted = [...data].reverse();

        sorted.forEach((item, i) => {
          const date = new Date(item.date);
          const dayStr = date.toLocaleDateString('en-US', {
            month: 'short',
            day: 'numeric',
            year: 'numeric'
          });
          const timeStr = date.toLocaleTimeString('en-US', {
            hour: '2-digit',
            minute: '2-digit',
            hour12: true
          });

          const entry = document.createElement('div');
          entry.className = 'entry';
          entry.innerHTML = `
            <div class="entry-dot"></div>
            <div class="entry-card">
              <div class="entry-meta">
                <div class="entry-meta-left">
                  <div class="entry-badge">
                    <span class="entry-badge-dot"></span>
                    ${item.page || 'Design'}
                  </div>
                  <div class="entry-title">${item.title}</div>
                  <div class="entry-desc">${item.description}</div>
                </div>
                <div class="entry-date">
                  <div class="entry-date-day">${dayStr}</div>
                  <div class="entry-date-time">${timeStr}</div>
                </div>
              </div>
              <div class="entry-actions">
                <a href="${item.file}" class="entry-btn primary" target="_blank">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
                  Preview
                </a>
                <a href="${item.figmaUrl}" class="entry-btn" target="_blank">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 5.5A3.5 3.5 0 0 1 8.5 2H12v7H8.5A3.5 3.5 0 0 1 5 5.5z"/><path d="M12 2h3.5a3.5 3.5 0 1 1 0 7H12V2z"/><path d="M12 12.5a3.5 3.5 0 1 1 7 0 3.5 3.5 0 1 1-7 0z"/><path d="M5 19.5A3.5 3.5 0 0 1 8.5 16H12v3.5a3.5 3.5 0 1 1-7 0z"/><path d="M5 12.5A3.5 3.5 0 0 1 8.5 9H12v7H8.5A3.5 3.5 0 0 1 5 12.5z"/></svg>
                  Figma
                </a>
                <a href="${item.file}" class="entry-btn" download>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  Download
                </a>
              </div>
              <div class="entry-preview">
                <div class="entry-preview-overlay" onclick="window.open('${item.file}', '_blank')"></div>
                <iframe src="${item.file}" loading="lazy" tabindex="-1"></iframe>
              </div>
            </div>
          `;

          timeline.appendChild(entry);
        });

      } catch (e) {
        console.error('Failed to load history:', e);
      }
    }

    loadHistory();
  </script>

</body>
</html>
